<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>foku</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      background: #111;
      color: #eee;
      font-family: sans-serif;
    }
    img { image-rendering: pixelated; background: #fff; border-radius: 8px; }
    #last-press { font-size: 3rem; min-height: 4rem; }
    #status { color: #888; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>foku</h1>
  <p>Scan to use your phone as a remote:</p>
  <img src="/host/qr.png" alt="QR code for controller url" width="200" height="200">
  <p id="status">Waiting for controller...</p>
  <div id="last-press"></div>
  <script>
    const status = document.getElementById('status');
    const lastPress = document.getElementById('last-press');
    const arrows = { up: '\\u2191', down: '\\u2193', left: '\\u2190', right: '\\u2192' };

    function connect() {
      const ws = new WebSocket('ws://' + location.host + '/ws?role=host');
      ws.onopen = () => { status.textContent = 'Connected. Waiting for input...'; };
      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'press' && msg.direction in arrows) {
            lastPress.textContent = arrows[msg.direction] + ' ' + msg.direction;
          }
        } catch (e) {
          console.error('Bad message from server:', event.data);
        }
      };
      ws.onclose = () => {
        status.textContent = 'Disconnected. Reconnecting...';
        setTimeout(connect, 1000);
      };
    }
    connect();
  </script>
</body>
</html>
